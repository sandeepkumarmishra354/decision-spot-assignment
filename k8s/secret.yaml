apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: user-management
type: Opaque
data:
  # Base64 encoded values (decode: echo -n 'value' | base64)
  # DB_USER = appuser
  DB_USER: YXBwdXNlcg==
  # DB_PASSWORD = apppassword
  DB_PASSWORD: YXBwcGFzc3dvcmQ=
  # JWT_SECRET = myjwtsecretkey123
  JWT_SECRET: bXlqd3RzZWNyZXRrZXkxMjM=
